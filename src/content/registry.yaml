# ============================================================================
# PLAYBOOK
# ============================================================================

playbook:

  - id: lesson-feeding-is-everything
    topic: feeding
    title: "Feeding is the single most important thing you do"
    summary: "Everything else depends on the right food at the right intervals."
    body:
      - "If feeding isn't going well, nothing else will either. Take it seriously from day one."
      - "Trust data over gut feel. We would have caught V.G.'s feeding issue days earlier if we'd been tracking from the start."
      - "When something feels off, the data gives you evidence to bring to your pediatrician instead of relying on someone's instinct."
    related_items: [huckleberry-app, baby-brezza-formula-pro, philips-avent-bottles]

  - id: lesson-feeding-formula
    topic: feeding
    title: "How much to feed — the 2.5x formula"
    summary: "Weight (lbs) × 2.5 = total oz/day."
    body:
      - "Take baby's weight in pounds, multiply by 2.5. That's the total ounces per day."
      - "Divide by the number of feeds to get ounces per feed."
      - "Example: 10 lb baby × 2.5 = 25 oz/day. If feeding every 3 hours (8 feeds), that's about 3 oz per feed."
      - "Never exceed 32 oz per day — check with your pediatrician if baby seems to want more."
    related_items: [huckleberry-app]

  - id: lesson-feed-timing
    topic: feeding
    title: "Track the hours between feeds"
    summary: "Newborns eat every 2–3 hours. Set a timer. Don't wait for crying."
    body:
      - "By the time they cry from hunger, they're already behind."
      - "Use Huckleberry to log every feed so you can see patterns and catch problems early."
    related_items: [huckleberry-app]

  - id: lesson-milk-temperature
    topic: feeding
    title: "Milk temperature — rely on data, not touch"
    summary: "The bottle surface is always warmer than the milk inside. Use a food thermometer."
    body:
      - "Aim for 99–105°F."
      - "Cold milk is fine, but for GI consistency and avoiding throat irritation, keep it steady."
      - "We place the glass bottle in a bowl of warm water and check with a food thermometer before every feed."
      - "For formula, the Baby Brezza dispenses at a set temperature."
      - "Esophagus burns from overheated milk happen more than people think."
    related_items: [baby-brezza-formula-pro, food-thermometer]

  - id: lesson-green-poop
    topic: feeding
    title: "Green poop is fine"
    summary: "Don't overanalyze diaper color."
    body:
      - "Green diapers usually mean undigested fortified iron from formula — it's normal."
      - "Focus on whether baby is gaining weight and having enough wet diapers, not the color."
    related_items: []

  - id: lesson-warm-milk-myth
    topic: feeding
    title: "Babies don't care if milk is warm"
    summary: "Babies have poorly developed taste buds. Cold or room temperature milk is perfectly fine."
    body:
      - "Warming milk adds risk with no real benefit."
      - "The bottle surface is always warmer than the milk inside, so what you feel on the outside tells you nothing about what baby is swallowing."
      - "If you do warm milk, measure with a food thermometer (99–105°F)."
    related_items: [food-thermometer]

  - id: lesson-no-oils
    topic: skin
    title: "Avoid oils on baby's skin"
    summary: "No ghee, no coconut oil, no seed oils."
    body:
      - "People will suggest them. Don't."
      - "Use only products your pediatrician recommends — CeraVe or Aquaphor are safe choices."
    related_items: [cerave-cream, aquaphor-baby-set]

  - id: lesson-bottles-air
    topic: bottles
    title: "Fussiness after feeds is almost always air"
    summary: "Air gets in from the wrong nipple flow rate, the wrong bottle, or not burping enough."
    body:
      - "Get the nipple flow right, use anti-colic bottles, and burp baby during and after every feed — not just at the end."
      - "These three things together prevent most colic issues."
      - "This is one of the most common problems new parents face and one of the easiest to fix."
      - "Don't wait weeks wondering why baby is fussy — check the bottle, nipple, and burping routine first."
    related_items: [philips-avent-bottles]

  - id: lesson-nipple-flow
    topic: bottles
    title: "Use the right nipple flow rate"
    summary: "Watch baby's drinking style, not their age."
    body:
      - "Philips Avent Natural Response nipples come in 5 flow rates (1 through 5)."
      - "Too fast → baby gulps air."
      - "Too slow → baby gets frustrated and swallows air trying harder."
      - "Start with the nipple that comes with the bottle."
      - "Move up if baby takes longer than 30 minutes to finish, falls asleep during feeds, or seems frustrated."
      - "Move down if baby is gulping or milk is leaking from their mouth."
      - "Enthusiastic drinkers with strong suction often need a lower flow (1 or 2) even as they get older."
      - "Slow, steady drinkers may need a higher flow (4 or 5) regardless of age."
    related_items: [philips-avent-bottles]
    links:
      guide: "https://www.usa.philips.com/c-f/XC000017498/which-natural-response-nipple-suits-my-baby-best"

  - id: lesson-burping
    topic: bottles
    title: "Burp during and after feeds"
    summary: "Don't wait until the bottle is finished."
    body:
      - "Pause halfway through, burp, then continue."
      - "If baby is squirming or pulling off the bottle, they probably need to burp."
      - "Hold baby upright against your shoulder and pat gently."
      - "Some babies need 5 minutes of patience before they'll burp — don't give up after 30 seconds."
    related_items: []

  - id: lesson-sleep-cycles
    topic: sleep
    title: "Babies have fundamentally different sleep cycles"
    summary: "They are not miniature adults. Any noise or light can pull them out of a cycle they need to complete."
    body:
      - "Their cycles are shorter, their bodies are still calibrating, and their reflexes aren't fully developed."
    related_items: [cradlewise-crib]

  - id: lesson-quiet-dark
    topic: sleep
    title: "Keep surroundings whisper quiet and pitch dark"
    summary: "Babies don't need to be 'familiarized with sound' — they need peace and quiet to sleep."
    body:
      - "People will tell you to get baby 'used to noise.' Don't."
      - "Invest in real blackout shades, not the cheap stick-on kind."
      - "Keep temperature consistent at 68–72°F."
    related_items: [ecobee-thermostat, cradlewise-crib, blackout-shades]

  - id: lesson-90-minute-rule
    topic: sleep
    title: "The 90-minute rule"
    summary: "Newborns can only handle about 60–90 minutes of awake time before they need to sleep again."
    body:
      - "Keep them up longer and they get overtired — an overtired baby fights sleep harder, not less."
      - "Once we started putting V.G. back in the crib within that window and letting the Cradlewise and white noise do the rest, everything changed."
      - "This single fix made the biggest difference in our sleep."
    related_items: [cradlewise-crib]
    links:
      guide: "https://huckleberrycare.com/blog/wake-windows-by-age"

  - id: lesson-nothing-in-crib
    topic: sleep
    title: "Nothing in the crib. Ever."
    summary: "No blankets, no pillows, no stuffed animals, no bumpers."
    body:
      - "Only the mattress and an approved fitted sheet."
      - "Follow the crib manufacturer's guidance — unemotional data, not opinions."
      - "A crib maker is not going to risk a wrongful death verdict by being overly cautious. If they say bare mattress and fitted sheet only, that's what it should be."
      - "People will say the approved sheets are overpriced. Spend the money anyway — there are better places to save."
      - "Pillows and blankets in a crib are a suffocation risk — babies have died from this."
    related_items: [cradlewise-crib]

  - id: lesson-eyes-open
    topic: sleep
    title: "Keep baby in the crib even if they don't look asleep"
    summary: "Babies sometimes sleep with their eyes open."
    body:
      - "If they're quiet and in the crib, leave them."
      - "Don't pick them up because you think they're awake."
    related_items: []

  - id: lesson-cry-during-sleep
    topic: sleep
    title: "Babies cry during sleep — don't intervene unless it's over a minute"
    summary: "Short cries and whimpers are normal sleep cycle transitions."
    body:
      - "If you rush in at every sound, you'll wake a baby who was about to settle back down on their own."
      - "Wait at least a minute before going in."
    related_items: [cradlewise-crib, owlet-dream-sock]

  - id: lesson-flat-head
    topic: sleep
    title: "Your baby is not going to get a flat head"
    summary: "If you're concerned, talk to your pediatrician. Don't put anything in the crib."
    body:
      - "Family ordered pillows for the crib while we were still in the hospital — before V.G. even came home."
      - "Pillows in a crib are a suffocation risk."
      - "If you're worried about head shape, ask your pediatrician at your monthly visit."
    related_items: []

  - id: lesson-dont-trust-experts
    topic: general
    title: "Don't rely on 'experts' or past experience"
    summary: "People with kids will confidently tell you how things work based on what they went through. Every baby is different."
    body:
      - "Take advice as input, not instruction."
      - "The most confident advice tends to come from the people closest to you — the ones who've raised kids before and remember it well. That confidence is exactly what makes it hard to push back."
    related_items: []

  - id: lesson-stomach-ache-story
    topic: general
    title: "Story: 'He has a stomach ache'"
    summary: "V.G. lost 9% of his body weight in 24 hours because the real issue — not enough food — was misdiagnosed as stomach pain."
    body:
      - "On day 2, V.G. wasn't eating well and was fussy. We were told it was stomach pain."
      - "He lost 9% of his body weight in 24 hours."
      - "The real issue was he wasn't getting enough food."
      - "Track weight, feed volumes, and wet diapers in Huckleberry. If feeding feels off, don't wait — the numbers will tell you before anyone's guess does."
    related_items: [huckleberry-app]

  - id: lesson-overtired-story
    topic: general
    title: "Story: 'He doesn't want to sleep — he's been sleeping all day'"
    summary: "Caretakers kept V.G. awake because they thought he'd been sleeping too much. The real problem: he was overtired."
    body:
      - "Newborns can only handle 60–90 minutes of awake time."
      - "Keeping them up longer makes it worse, not better."
    related_items: [cradlewise-crib]

  - id: lesson-diaper-change-story
    topic: general
    title: "Story: 'I know how to change a diaper'"
    summary: "You probably don't. Unless you've been shown by a medical professional — assume you need to learn."
    body:
      - "You might have changed diapers hundreds of times and still be doing it wrong."
      - "Ask the nurses at the hospital to walk you through it before discharge."
      - "Don't be embarrassed. Everyone gets it wrong at first."
    related_items: []
    links:
      guide: "https://www.pampers.com/en-us/baby/diapering/article/how-to-change-a-diaper"

  - id: lesson-air-quality
    topic: environment
    title: "Monitor air quality. Respond to it."
    summary: "Diaper changes release VOCs that linger in a closed nursery."
    body:
      - "We noticed the air quality monitor turning red in the nursery — VOCs spiking."
      - "Turns out it was from diaper changes. The chemicals in wipes, creams, and dirty diapers release VOCs that linger in a closed room."
      - "Now we run the air purifier on auto mode so it ramps up when it detects a spike, and we ventilate after changes when possible."
    related_items: [amazon-air-monitor, blueair-purifier, ecobee-thermostat]

  - id: lesson-bathing-frequency
    topic: bath
    title: "Don't over-bathe"
    summary: "Every 3rd or 4th day is enough. Water-only on off days."
    body:
      - "At our 2-month appointment, the doctor told us V.G.'s dry skin was from bathing too often."
      - "On the days in between, if baby is smelly, wash with water only — no soap."
      - "Alternate between soap and no-soap washes."
      - "Autoimmune and skin sensitivity issues are real."
    related_items: [contours-bathtub, cerave-cream]

  - id: lesson-tub-in-shower
    topic: bath
    title: "Use the tub in the shower"
    summary: "Place the baby bathtub in the shower, not in the bathtub."
    body:
      - "Easier to control the water, faster to fill and drain."
      - "You can rinse baby with the shower head or the Frida sprayer."
      - "Much more practical than bending over a bathtub."
    related_items: [contours-bathtub, frida-bath-sprayer]

  - id: lesson-sleep-resources
    topic: sleep
    title: "Sleep reading list"
    summary: "Essential reading on baby sleep patterns and wake windows."
    body: []
    links:
      sleep_foundation: "https://www.sleepfoundation.org/children-and-sleep"
      hopkins: "https://www.hopkinsmedicine.org/health/conditions-and-diseases/staying-healthy-during-pregnancy/newborn-sleep-patterns"
      wake_windows: "https://huckleberrycare.com/blog/wake-windows-by-age"

