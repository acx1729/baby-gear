# ============================================================================
# SKIPS
# ============================================================================

skips:

  - id: skip-changing-table
    name: Dedicated Changing Table
    category: changing
    reason: "Less safe than a sturdy desk. We used a height-adjustable desk — adjusts to whoever is changing, sturdier, reusable."
    alternative: keekaroo-peanut

  - id: skip-brezza-bottle-washer
    name: Baby Brezza Bottle Washer Pro
    category: feeding
    price: 260.00
    reason: "Only fits 4 bottles. Cycle takes a while. 3–4 loads/day. Dishwasher + bottle basket works better."
    alternative: bottle-basket

  - id: skip-spectra-portable
    name: Spectra Synergy Gold Portable
    category: feeding
    reason: "Preset suction levels only — no fine control. Get the standard + eufy wearable."
    alternative: spectra-synergy-gold

  - id: skip-milk-warmers
    name: Milk Warmers (any brand)
    category: feeding
    reason: "They heat a water bath or steam on a timer — they measure the medium, not the milk. Output temp varies by milk volume, starting temp, and bottle material (glass vs thin plastic vs polypropylene all transfer heat differently — same warmer, same setting, different milk temps). Glass holds heat longer and overshoots easily. No setting is reliably consistent. Burn risk is real."
    alternative: baby-brezza-formula-pro

